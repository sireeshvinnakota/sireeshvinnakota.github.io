<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 — Enter Your Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --pitch:    #0D3D2B;
    --pitch-mid:#112E1F;
    --pitch-lt: #1A4A35;
    --gold:     #E8C84A;
    --gold-dim: #C4A830;
    --white:    #F5F5F0;
    --muted:    #A8B8A8;
    --text:     #E8E4DC;
    --stripe:   rgba(255,255,255,0.03);
    --border:   rgba(255,255,255,0.1);
    --error:    #E05555;
    --success:  #4CAF70;
    --radius:   6px;
  }

  body {
    background: var(--pitch);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(
        90deg,
        var(--stripe) 0px,
        var(--stripe) 1px,
        transparent 1px,
        transparent 80px
      );
    pointer-events: none;
    z-index: 0;
  }

  .page { position: relative; z-index: 1; max-width: 760px; margin: 0 auto; padding: 0 20px 80px; }

  header {
    text-align: center;
    padding: 52px 0 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 10vw, 88px);
    line-height: 0.9;
    color: var(--white);
    letter-spacing: 0.02em;
    margin-bottom: 14px;
  }
  h1 span { color: var(--gold); }
  h1 a { color: inherit; text-decoration: none; }
  .subtitle { font-size: 14px; color: var(--muted); }

  .card {
    background: var(--pitch-mid);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 20px;
    overflow: hidden;
  }

  .card-header {
    background: var(--pitch-lt);
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
  }
  .card-header:hover { background: #1f5a40; }
  .group-badge {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: var(--gold);
    width: 32px;
    flex-shrink: 0;
  }
  .card-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: var(--white);
    flex: 1;
  }
  .team-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .team-pill {
    font-size: 11px;
    font-weight: 500;
    background: rgba(255,255,255,0.07);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 7px;
    color: var(--muted);
  }
  .chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; flex-shrink: 0; }
  .card.open .chevron { transform: rotate(180deg); }
  .card-body { display: none; padding: 0; }
  .card.open .card-body { display: block; }

  .match-row {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 8px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
  .match-row:last-child { border-bottom: none; }
  .match-row:nth-child(even) { background: var(--stripe); }

  /* ── Pick buttons ── */
  .pick-group { display: flex; width: 100%; gap: 6px; align-items: center; }
  .pick-btn {
    flex: 1;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 8px 6px;
    border-radius: 5px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--muted);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.08s;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    line-height: 1.3;
  }
  .pick-btn:hover { background: rgba(255,255,255,0.1); color: var(--white); border-color: rgba(255,255,255,0.25); }
  .pick-btn:active { transform: scale(0.97); }

  .pick-btn.home.active { background: #1e4fa8; border-color: #4a7fd5; color: #fff; }
  .pick-btn.draw {
    flex: 0 0 58px;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: rgba(168,184,168,0.6);
  }
  .pick-btn.draw:hover { color: var(--white); }
  .pick-btn.draw.active { background: #3d3d3d; border-color: #888; color: #ccc; }
  .pick-btn.away.active { background: #8a1e1e; border-color: #d05555; color: #fff; }

  /* ── Locked match state ── */
  .match-row.locked .pick-btn {
    cursor: not-allowed;
    opacity: 0.45;
    pointer-events: none;
  }
  /* Winner button stays lit but also gets a gold ring */
  .match-row.locked .pick-btn.winner {
    opacity: 1;
    pointer-events: none;
    box-shadow: 0 0 0 2px var(--gold);
  }
  .match-row.locked .pick-btn.home.winner { background: #1e4fa8; border-color: #4a7fd5; color: #fff; }
  .match-row.locked .pick-btn.draw.winner { background: #3d3d3d; border-color: #888; color: #ccc; }
  .match-row.locked .pick-btn.away.winner { background: #8a1e1e; border-color: #d05555; color: #fff; }

  .locked-badge {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gold);
    white-space: nowrap;
    padding-left: 10px;
    flex-shrink: 0;
  }

  /* ── Info form ── */
  .info-card { padding: 24px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media (max-width: 500px) { .form-grid { grid-template-columns: 1fr; } }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  input[type="text"], input[type="email"], input[type="tel"] {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    transition: border-color 0.15s;
  }
  input:focus { outline: none; border-color: var(--gold); }
  input::placeholder { color: rgba(168,184,168,0.4); }

  /* ── Progress bar ── */
  .progress-wrap {
    position: sticky;
    top: 0;
    z-index: 10;
    background: var(--pitch-mid);
    border-bottom: 1px solid var(--border);
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 24px;
  }
  .progress-bar-bg { flex: 1; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
  .progress-bar-fill { height: 100%; background: var(--gold); border-radius: 2px; transition: width 0.3s; }
  .progress-label { font-size: 12px; color: var(--muted); white-space: nowrap; min-width: 60px; text-align: right; }

  /* ── Submit ── */
  .submit-wrap { margin-top: 28px; text-align: center; }
  .btn-submit {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.1em;
    background: var(--gold);
    color: var(--pitch);
    border: none;
    border-radius: var(--radius);
    padding: 16px 56px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-submit:hover { background: #f0d255; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .status {
    margin-top: 16px;
    padding: 12px 18px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 500;
    display: none;
  }
  .status.error { background: rgba(224,85,85,0.15); border: 1px solid var(--error); color: #ff8a8a; display: block; }
  .status.success { background: rgba(76,175,112,0.15); border: 1px solid var(--success); color: #7ee8a2; display: block; }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  .nav-links { display: flex; gap: 20px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
  .view-link {
    display: inline-block;
    color: var(--gold);
    font-size: 13px;
    text-decoration: none;
    border-bottom: 1px solid rgba(232,200,74,0.3);
  }
  .view-link:hover { border-bottom-color: var(--gold); }
</style>
</head>
<body>
<div class="page">
  <header>
    <p class="eyebrow">USA · Canada · Mexico</p>
    <h1><a href="index.html">WORLD CUP<br><span>2026</span></a></h1>
    <p class="subtitle">Group Stage Prediction Form &nbsp;·&nbsp; June 11 – 27</p>
  </header>

  <div class="top-bar" style="margin-bottom:24px">
    <a href="index.html" class="back-link">⌂ Home</a>
  </div>

  <div class="card open" id="card-info">
    <div class="card-header" onclick="toggleCard('card-info')">
      <span class="group-badge">✦</span>
      <h2>Your Details</h2>
      <span class="chevron">▼</span>
    </div>
    <div class="card-body">
      <div class="info-card">
        <div class="form-grid">
          <div>
            <label for="f-name">Name</label>
            <input type="text" id="f-name" placeholder="e.g. Sireesh" required>
          </div>
          <div>
            <label for="f-email">Email</label>
            <input type="email" id="f-email" placeholder="you@example.com" required>
          </div>
          <div>
            <label for="f-phone">Phone (optional)</label>
            <input type="tel" id="f-phone" placeholder="+1 (555) 000-0000">
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="progress-wrap">
    <span style="font-size:12px;color:var(--muted);white-space:nowrap">Group picks</span>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <span class="progress-label" id="progress-label">0 / 72</span>
  </div>

  <div id="groups-container"></div>

  <div class="submit-wrap">
    <div id="status-msg" class="status"></div>
    <button class="btn-submit" id="btn-submit" onclick="submitForm()">LOCK IN MY PICKS</button>
    <div class="nav-links">
      <a href="standings.html" class="view-link">→ View everyone's predictions</a>
      <a href="leaderboard.html" class="view-link">→ Leaderboard</a>
    </div>
  </div>
</div>

<script>
const GROUPS = {
  A: ["Mexico","South Africa","South Korea","Czechia"],
  B: ["Canada","Bosnia-Herzegovina","Qatar","Switzerland"],
  C: ["Brazil","Haiti","Morocco","Scotland"],
  D: ["United States","Paraguay","Australia","Türkiye"],
  E: ["Germany","Curaçao","Ivory Coast","Ecuador"],
  F: ["Netherlands","Japan","Sweden","Tunisia"],
  G: ["Belgium","Egypt","Iran","New Zealand"],
  H: ["Spain","Cape Verde","Saudi Arabia","Uruguay"],
  I: ["France","Iraq","Norway","Senegal"],
  J: ["Algeria","Argentina","Austria","Jordan"],
  K: ["Colombia","Congo DR","Portugal","Uzbekistan"],
  L: ["Croatia","England","Ghana","Panama"],
};

const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbL3pVg3gIvLbgc9jk_wqcJiqa1XTEJGVAf26qyRnGJ1jD5pSFiojA9mFOq7Gj4lso/exec";

// results fetched from sheet: { "A_0": "Mexico", "B_2": "Draw", ... }
let results = {};

function getMatches(teams) {
  const m = [];
  for (let i = 0; i < teams.length; i++)
    for (let j = i+1; j < teams.length; j++)
      m.push([teams[i], teams[j]]);
  return m;
}

function toggleCard(id) {
  document.getElementById(id).classList.toggle('open');
}

let totalPicks = 0;
let filledPicks = 0;

function buildGroups() {
  const container = document.getElementById('groups-container');
  Object.entries(GROUPS).forEach(([letter, teams]) => {
    const matches = getMatches(teams);
    totalPicks += matches.length;

    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${letter}`;

    const pillsHtml = teams.map(t => `<span class="team-pill">${t}</span>`).join('');
    card.innerHTML = `
      <div class="card-header" onclick="toggleCard('card-${letter}')">
        <span class="group-badge">${letter}</span>
        <h2>GROUP ${letter}</h2>
        <div class="team-pills">${pillsHtml}</div>
        <span class="chevron">▼</span>
      </div>
      <div class="card-body" id="body-${letter}"></div>
    `;

    const body = card.querySelector('.card-body');
    matches.forEach(([home, away], mi) => {
      const key = `${letter}_${mi}`;
      const row = document.createElement('div');
      row.className = 'match-row';
      row.dataset.key = key;
      row.innerHTML = `
        <div class="pick-group" id="pick-group-${key}">
          <button type="button" class="pick-btn home" data-key="${key}" data-value="${home}" onclick="onPickBtn(this)">${home}</button>
          <button type="button" class="pick-btn draw" data-key="${key}" data-value="Draw" onclick="onPickBtn(this)">Draw</button>
          <button type="button" class="pick-btn away" data-key="${key}" data-value="${away}" onclick="onPickBtn(this)">${away}</button>
        </div>
      `;
      body.appendChild(row);
    });
    container.appendChild(card);
  });
  updateProgress();
}

// Apply locked state to a match row once results are loaded
function applyLocks() {
  Object.entries(results).forEach(([key, winner]) => {
    const row = document.querySelector(`.match-row[data-key="${key}"]`);
    if (!row) return;
    row.classList.add('locked');
    // highlight the winning button
    row.querySelectorAll('.pick-btn').forEach(btn => {
      if (btn.dataset.value === winner) btn.classList.add('winner');
    });
    // add FT badge if not already there
    if (!row.querySelector('.locked-badge')) {
      const badge = document.createElement('span');
      badge.className = 'locked-badge';
      badge.textContent = 'FT';
      row.appendChild(badge);
    }
  });
}

async function loadResults() {
  try {
    const r = await fetch(APPS_SCRIPT_URL + '?action=get', { cache: 'no-store' });
    const j = await r.json();
    results = j.results || {};
    applyLocks();
  } catch(e) {
    // silently fail — predictions still work, just no locking
  }
}

const picks = {};

function onPickBtn(btn) {
  const key = btn.dataset.key;
  // Don't allow picks on locked matches
  if (results[key]) return;

  const val = btn.dataset.value;
  const prev = picks[key];

  document.querySelectorAll(`#pick-group-${key} .pick-btn`).forEach(b => b.classList.remove('active'));

  if (prev === val) {
    delete picks[key];
    if (prev) filledPicks--;
  } else {
    btn.classList.add('active');
    picks[key] = val;
    if (!prev) filledPicks++;
  }
  updateProgress();
}

function updateProgress() {
  const pct = totalPicks > 0 ? (filledPicks / totalPicks) * 100 : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${filledPicks} / ${totalPicks}`;
}

function collectData() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const phone = document.getElementById('f-phone').value.trim();
  if (!name || !email) return null;

  const allPicks = {};
  let allFilled = true;
  Object.entries(GROUPS).forEach(([letter, teams]) => {
    const matches = getMatches(teams);
    matches.forEach(([home, away], mi) => {
      const key = `${letter}_${mi}`;
      // skip locked matches from the "all filled" check
      if (results[key]) return;
      const val = picks[key] || '';
      allPicks[key] = val;
      if (!val) allFilled = false;
    });
  });
  return { name, email, phone, picks: allPicks, allFilled };
}

async function submitForm() {
  const data = collectData();
  const statusEl = document.getElementById('status-msg');
  const btnEl = document.getElementById('btn-submit');

  statusEl.className = 'status';
  statusEl.textContent = '';

  if (!data) {
    statusEl.className = 'status error';
    statusEl.textContent = 'Please fill in your name and email before submitting.';
    return;
  }
  const openCount = Object.values(data.picks).filter(v => !v).length;
  if (!data.allFilled) {
    const ok = confirm(`You have ${openCount} unpicked matches. Submit anyway?`);
    if (!ok) return;
  }

  btnEl.disabled = true;
  btnEl.textContent = 'SUBMITTING…';

  const payload = {
    name: data.name,
    email: data.email,
    phone: data.phone,
    timestamp: new Date().toISOString(),
    picks: data.picks,
  };

  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    statusEl.className = 'status success';
    statusEl.innerHTML = `✓ Predictions locked in for <strong>${data.name}</strong>! <br><a href="standings.html" class="view-link">See everyone's picks →</a>`;
    btnEl.textContent = 'SUBMITTED ✓';
  } catch (err) {
    statusEl.className = 'status error';
    statusEl.textContent = 'Submission failed. Please try again or contact Sireesh.';
    btnEl.disabled = false;
    btnEl.textContent = 'LOCK IN MY PICKS';
  }
}

buildGroups();
loadResults();
</script>
</body>
</html>
