<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WC 2026 — Group Stage Predictions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --pitch:#0D3D2B;--pitch-mid:#112E1F;--pitch-lt:#1A4A35;
  --gold:#E8C84A;--white:#F5F5F0;--muted:#8AA89A;--text:#E8E4DC;
  --border:rgba(255,255,255,0.09);--stripe:rgba(255,255,255,0.025);
  --col-home:#3A7BD5;--col-draw:#7A7A7A;--col-away:#E05555;
  --radius:6px;
}
body{background:var(--pitch);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;line-height:1.5;min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:repeating-linear-gradient(90deg,var(--stripe) 0,var(--stripe) 1px,transparent 1px,transparent 80px);pointer-events:none;z-index:0}
.page{position:relative;z-index:1;max-width:820px;margin:0 auto;padding:0 20px 80px}
header{text-align:center;padding:52px 0 36px;border-bottom:1px solid var(--border);margin-bottom:36px}
.eyebrow{font-size:11px;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);margin-bottom:10px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,8vw,72px);line-height:.9;color:var(--white);letter-spacing:.02em;margin-bottom:14px}
h1 span{color:var(--gold)}
.subtitle{font-size:14px;color:var(--muted)}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.back-link{color:var(--muted);font-size:13px;text-decoration:none;transition:color .15s}
.back-link:hover{color:var(--gold)}
.right-controls{display:flex;align-items:center;gap:10px}
.last-updated{font-size:11px;color:var(--muted)}
.btn-sm{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:5px 14px;cursor:pointer;transition:all .15s}
.btn-sm:hover{border-color:var(--gold);color:var(--gold)}
.btn-sm.gold{border-color:rgba(232,200,74,0.5);color:var(--gold)}
.btn-sm.gold:hover{background:var(--gold);color:var(--pitch)}
.stats-bar{display:flex;gap:24px;flex-wrap:wrap;background:var(--pitch-mid);border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;margin-bottom:24px}
.stat{font-size:12px;color:var(--muted)}
.stat strong{display:block;font-family:'Bebas Neue';font-size:26px;color:var(--white);line-height:1}
.filter-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:24px;align-items:center}
.filter-btn{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:5px 12px;cursor:pointer;transition:all .15s}
.filter-btn:hover{border-color:var(--gold);color:var(--gold)}
.filter-btn.active{background:var(--gold);color:var(--pitch);border-color:var(--gold)}
.filter-btn.today-btn{border-color:rgba(232,200,74,0.4);color:var(--gold)}
.filter-btn.today-btn::before{content:'';display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--gold);margin-right:6px;vertical-align:middle;animation:pulse 1.8s ease-in-out infinite}
.filter-btn.today-btn.active{background:var(--gold);color:var(--pitch)}
.filter-btn.today-btn.active::before{background:var(--pitch)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.filter-divider{width:1px;height:20px;background:var(--border);margin:0 4px}
.group-select-wrap{position:relative;display:inline-flex;align-items:center}
.group-select{font-family:'Inter',sans-serif;font-size:12px;font-weight:600;background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:4px;padding:5px 28px 5px 12px;cursor:pointer;transition:all .15s;appearance:none;-webkit-appearance:none;outline:none}
.group-select:hover{border-color:var(--gold);color:var(--gold)}
.group-select.active{background:var(--gold);color:var(--pitch);border-color:var(--gold)}
.group-select option{background:#0D3D2B;color:var(--text);font-weight:600}
.group-select-arrow{position:absolute;right:9px;top:50%;transform:translateY(-50%);pointer-events:none;color:var(--muted);font-size:10px;transition:color .15s}
.group-select-wrap:hover .group-select-arrow{color:var(--gold)}
.group-select.active + .group-select-arrow{color:var(--pitch)}
.legend{display:flex;gap:16px;margin-bottom:20px;align-items:center;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
.legend-dot{width:10px;height:10px;border-radius:2px}
.group-section{margin-bottom:36px}
.group-heading{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:.1em;color:var(--gold);padding:10px 0 6px;border-bottom:1px solid var(--border);margin-bottom:2px;display:flex;align-items:baseline;gap:12px}
.group-teams-list{font-family:'Inter',sans-serif;font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0}
.match-row{display:grid;grid-template-columns:160px 1fr;border-bottom:1px solid rgba(255,255,255,0.04);align-items:center;min-height:58px}
.match-row:nth-child(even){background:var(--stripe)}
.match-row:last-child{border-bottom:none}
.match-info{padding:10px 14px 10px 4px}
.match-teams{font-size:13px;font-weight:600;color:var(--white);display:flex;align-items:center;gap:6px}
.match-vs{font-size:10px;color:var(--muted);font-weight:400}
.match-meta{font-size:10px;color:var(--muted);margin-top:3px}
.match-date{font-weight:600}
.vote-col{padding:10px 4px 10px 0}
.no-votes{height:28px;display:flex;align-items:center}
.no-votes-text{font-size:11px;color:rgba(168,184,168,0.3);font-style:italic}
.bar-track{display:flex;height:28px;border-radius:4px;overflow:hidden}
.bar-seg{height:100%;display:flex;align-items:center;justify-content:center;transition:filter .15s;cursor:default;overflow:hidden;flex-shrink:0}
.bar-seg:hover{filter:brightness(1.2);z-index:2}
.seg-home{background:var(--col-home)}
.seg-draw{background:var(--col-draw)}
.seg-away{background:var(--col-away)}
.seg-label{font-size:11px;font-weight:700;color:rgba(255,255,255,0.92);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 6px;pointer-events:none;user-select:none}
.tooltip{position:fixed;background:#071f15;border:1px solid var(--gold);border-radius:6px;padding:10px 14px;font-size:12px;color:var(--text);pointer-events:none;z-index:1000;max-width:220px;box-shadow:0 4px 20px rgba(0,0,0,0.6);display:none}
.tooltip-team{font-weight:700;margin-bottom:5px;font-size:13px}
.tooltip-names{line-height:1.8}
.tooltip-count{font-size:10px;color:var(--muted);margin-top:4px}
.loading-wrap,.empty-state{text-align:center;padding:80px 20px;color:var(--muted)}
.spinner{display:inline-block;width:24px;height:24px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:14px}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state a{color:var(--gold)}

.result-badge-row{margin-top:6px;margin-bottom:8px}
.result-badge{
  display:inline-block;margin-left:8px;padding:2px 6px;border-radius:3px;
  font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  background:rgba(232,200,74,.15);border:1px solid rgba(232,200,74,.4);color:var(--gold)
}
.bar-seg.winner{box-shadow:inset 0 0 0 2px var(--gold);filter:brightness(1.15)}

</style>
</head>
<body>
<div class="page">
  <header>
    <p class="eyebrow">USA &middot; Canada &middot; Mexico</p>
    <h1>WORLD CUP <span>2026</span><br>PREDICTIONS</h1>
    <p class="subtitle">Group Stage &mdash; How everyone voted</p>
  </header>
  <div class="top-bar">
    <a href="predict.html" class="back-link">&larr; Submit your predictions</a>
    <div class="right-controls">
      <a href="leaderboard.html" class="btn-sm gold">🏆 Leaderboard</a>
      <span class="last-updated" id="last-updated">Loading&hellip;</span>
      <button class="btn-sm" onclick="loadData()">&circlearrowleft; Refresh</button>
    </div>
  </div>
  <div id="stats-bar" class="stats-bar" style="display:none"></div>
  <div class="legend">
    <span style="font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.08em">LEGEND</span>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-home)"></div>Home team</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-draw)"></div>Draw</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--col-away)"></div>Away team</div>
    <div class="legend-item" style="margin-left:auto;font-style:italic">Hover a segment for names</div>
  </div>
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" id="btn-all" onclick="setFilter('all',this)">All Groups</button>
    <div class="group-select-wrap">
      <select class="group-select" id="group-select" onchange="onGroupSelect(this)">
        <option value="">Group</option>
        <option value="A">Group A</option>
        <option value="B">Group B</option>
        <option value="C">Group C</option>
        <option value="D">Group D</option>
        <option value="E">Group E</option>
        <option value="F">Group F</option>
        <option value="G">Group G</option>
        <option value="H">Group H</option>
        <option value="I">Group I</option>
        <option value="J">Group J</option>
        <option value="K">Group K</option>
        <option value="L">Group L</option>
      </select>
      <span class="group-select-arrow">&#9660;</span>
    </div>
    <div class="filter-divider"></div>
    <button class="filter-btn" id="btn-yesterday" onclick="setFilter('yesterday',this)">Yesterday</button>
    <button class="filter-btn today-btn" id="btn-today" onclick="setFilter('today',this)">Today</button>
    <button class="filter-btn" id="btn-tomorrow" onclick="setFilter('tomorrow',this)">Tomorrow</button>
  </div>
  <div id="main-content">
    <div class="loading-wrap"><div class="spinner"></div><p>Loading predictions&hellip;</p></div>
  </div>
</div>
<div class="tooltip" id="tooltip">
  <div class="tooltip-team" id="tt-team"></div>
  <div class="tooltip-names" id="tt-names"></div>
  <div class="tooltip-count" id="tt-count"></div>
</div>
<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxbL3pVg3gIvLbgc9jk_wqcJiqa1XTEJGVAf26qyRnGJ1jD5pSFiojA9mFOq7Gj4lso/exec";

const GROUPS = {
  A:["Mexico","South Africa","South Korea","Czechia"],
  B:["Canada","Bosnia-Herzegovina","Qatar","Switzerland"],
  C:["Brazil","Haiti","Morocco","Scotland"],
  D:["United States","Paraguay","Australia","T\u00fcrkiye"],
  E:["Germany","Cura\u00e7ao","Ivory Coast","Ecuador"],

  L:["Croatia","England","Ghana","Panama"],
};

// Schedule entries aligned to getMatches() order: (0,1),(0,2),(0,3),(1,2),(1,3),(2,3)
// Each entry: [home, away, date, timeET, venue]
const SCHEDULE = {
  A:[
    ["Mexico","South Africa","Jun 11","3:00 PM ET","Estadio Azteca, Mexico City"],
    ["Mexico","South Korea","Jun 18","9:00 PM ET","Estadio Akron, Zapopan"],
    ["Mexico","Czechia","Jun 24","9:00 PM ET","Estadio Azteca, Mexico City"],
    ["South Africa","South Korea","Jun 24","9:00 PM ET","Estadio BBVA, Guadalupe"],
    ["South Africa","Czechia","Jun 18","12:00 PM ET","Mercedes-Benz Stadium, Atlanta"],
    ["South Korea","Czechia","Jun 11","10:00 PM ET","Estadio Akron, Zapopan"],
  ],
  B:[
    ["Canada","Bosnia-Herzegovina","Jun 12","3:00 PM ET","BMO Field, Toronto"],
    ["Canada","Qatar","Jun 18","6:00 PM ET","BC Place, Vancouver"],
    ["Canada","Switzerland","Jun 24","3:00 PM ET","BC Place, Vancouver"],
    ["Bosnia-Herzegovina","Qatar","Jun 24","3:00 PM ET","Lumen Field, Seattle"],
    ["Bosnia-Herzegovina","Switzerland","Jun 18","3:00 PM ET","SoFi Stadium, Inglewood"],
    ["Qatar","Switzerland","Jun 13","3:00 PM ET","Levi's Stadium, Santa Clara"],
  ],
  C:[
    ["Brazil","Haiti","Jun 19","9:00 PM ET","Lincoln Financial Field, Philadelphia"],
    ["Brazil","Morocco","Jun 13","6:00 PM ET","MetLife Stadium, East Rutherford"],
    ["Brazil","Scotland","Jun 24","6:00 PM ET","Hard Rock Stadium, Miami Gardens"],
    ["Haiti","Morocco","Jun 24","6:00 PM ET","Mercedes-Benz Stadium, Atlanta"],
    ["Haiti","Scotland","Jun 13","9:00 PM ET","Gillette Stadium, Foxborough"],
    ["Morocco","Scotland","Jun 19","6:00 PM ET","Gillette Stadium, Foxborough"],
  ],
  D:[
    ["United States","Paraguay","Jun 12","9:00 PM ET","SoFi Stadium, Inglewood"],
    ["United States","Australia","Jun 19","3:00 PM ET","Lumen Field, Seattle"],
    ["United States","T\u00fcrkiye","Jun 25","10:00 PM ET","SoFi Stadium, Inglewood"],
    ["Paraguay","Australia","Jun 25","10:00 PM ET","Levi's Stadium, Santa Clara"],
    ["Paraguay","T\u00fcrkiye","Jun 19","12:00 AM ET","Levi's Stadium, Santa Clara"],
    ["Australia","T\u00fcrkiye","Jun 13","12:00 AM ET","BC Place, Vancouver"],
  ],
  E:[
    ["Germany","Cura\u00e7ao","Jun 14","1:00 PM ET","NRG Stadium, Houston"],
    ["Germany","Ivory Coast","Jun 20","4:00 PM ET","BMO Field, Toronto"],
    ["Germany","Ecuador","Jun 25","4:00 PM ET","MetLife Stadium, East Rutherford"],
    ["Cura\u00e7ao","Ivory Coast","Jun 25","4:00 PM ET","Lincoln Financial Field, Philadelphia"],
    ["Cura\u00e7ao","Ecuador","Jun 20","8:00 PM ET","Arrowhead Stadium, Kansas City"],
    ["Ivory Coast","Ecuador","Jun 14","7:00 PM ET","Lincoln Financial Field, Philadelphia"],
  ],
  F:[
    ["Netherlands","Japan","Jun 14","4:00 PM ET","AT&T Stadium, Arlington"],
    ["Netherlands","Sweden","Jun 20","1:00 PM ET","NRG Stadium, Houston"],
    ["Netherlands","Tunisia","Jun 25","7:00 PM ET","AT&T Stadium, Arlington"],
    ["Japan","Sweden","Jun 25","7:00 PM ET","Arrowhead Stadium, Kansas City"],
    ["Japan","Tunisia","Jun 20","12:00 AM ET","Estadio BBVA, Guadalupe"],
    ["Sweden","Tunisia","Jun 14","10:00 PM ET","Estadio BBVA, Guadalupe"],
  ],
  G:[
    ["Belgium","Egypt","Jun 15","3:00 PM ET","Lumen Field, Seattle"],
    ["Belgium","Iran","Jun 21","3:00 PM ET","SoFi Stadium, Inglewood"],
    ["Belgium","New Zealand","Jun 26","11:00 PM ET","BC Place, Vancouver"],
    ["Egypt","Iran","Jun 26","11:00 PM ET","Lumen Field, Seattle"],
    ["Egypt","New Zealand","Jun 21","9:00 PM ET","BC Place, Vancouver"],
    ["Iran","New Zealand","Jun 15","9:00 PM ET","SoFi Stadium, Inglewood"],
  ],
  H:[
    ["Spain","Cape Verde","Jun 15","12:00 PM ET","Mercedes-Benz Stadium, Atlanta"],
    ["Spain","Saudi Arabia","Jun 21","12:00 PM ET","Mercedes-Benz Stadium, Atlanta"],
    ["Spain","Uruguay","Jun 26","8:00 PM ET","NRG Stadium, Houston"],
    ["Cape Verde","Saudi Arabia","Jun 26","8:00 PM ET","Estadio Akron, Zapopan"],
    ["Cape Verde","Uruguay","Jun 21","6:00 PM ET","Hard Rock Stadium, Miami Gardens"],
    ["Saudi Arabia","Uruguay","Jun 15","6:00 PM ET","Hard Rock Stadium, Miami Gardens"],
  ],
  I:[
    ["France","Iraq","Jun 22","5:00 PM ET","Lincoln Financial Field, Philadelphia"],
    ["France","Norway","Jun 26","3:00 PM ET","Gillette Stadium, Foxborough"],
    ["France","Senegal","Jun 16","3:00 PM ET","MetLife Stadium, East Rutherford"],
    ["Iraq","Norway","Jun 16","6:00 PM ET","Gillette Stadium, Foxborough"],
    ["Iraq","Senegal","Jun 26","3:00 PM ET","BMO Field, Toronto"],
    ["Norway","Senegal","Jun 22","8:00 PM ET","MetLife Stadium, East Rutherford"],
  ],
  J:[
    ["Algeria","Argentina","Jun 16","9:00 PM ET","Arrowhead Stadium, Kansas City"],
    ["Algeria","Austria","Jun 27","10:00 PM ET","Arrowhead Stadium, Kansas City"],
    ["Algeria","Jordan","Jun 22","11:00 PM ET","Levi's Stadium, Santa Clara"],
    ["Argentina","Austria","Jun 22","1:00 PM ET","AT&T Stadium, Arlington"],
    ["Argentina","Jordan","Jun 27","10:00 PM ET","AT&T Stadium, Arlington"],
    ["Austria","Jordan","Jun 16","12:00 AM ET","Levi's Stadium, Santa Clara"],
  ],
  K:[
    ["Colombia","Congo DR","Jun 23","10:00 PM ET","Estadio Akron, Zapopan"],
    ["Colombia","Portugal","Jun 27","7:30 PM ET","Hard Rock Stadium, Miami Gardens"],
    ["Colombia","Uzbekistan","Jun 17","10:00 PM ET","Estadio Azteca, Mexico City"],
    ["Congo DR","Portugal","Jun 17","7:30 PM ET","NRG Stadium, Houston"],
    ["Congo DR","Uzbekistan","Jun 27","1:00 PM ET","NRG Stadium, Houston"],
    ["Portugal","Uzbekistan","Jun 23","1:00 PM ET","NRG Stadium, Houston"],
  ],
  L:[
    ["Croatia","England","Jun 17","4:00 PM ET","AT&T Stadium, Arlington"],
    ["Croatia","Ghana","Jun 27","5:00 PM ET","Lincoln Financial Field, Philadelphia"],
    ["Croatia","Panama","Jun 23","7:00 PM ET","BMO Field, Toronto"],
    ["England","Ghana","Jun 23","4:00 PM ET","Gillette Stadium, Foxborough"],
    ["England","Panama","Jun 27","5:00 PM ET","MetLife Stadium, East Rutherford"],
    ["Ghana","Panama","Jun 17","7:00 PM ET","BMO Field, Toronto"],
  ],
};

function getMatches(t){const m=[];for(let i=0;i<t.length;i++)for(let j=i+1;j<t.length;j++)m.push([t[i],t[j]]);return m}

let allData=[], results={}, currentFilter='all';

const tooltip=document.getElementById('tooltip');
let ttOn=false;

function showTip(e,label,names,color){
  document.getElementById('tt-team').textContent=label;
  document.getElementById('tt-team').style.color=color;
  document.getElementById('tt-names').innerHTML=names.length
    ?names.map(n=>'<span>'+esc(n)+'</span><br>').join('')
    :'<span style="color:var(--muted);font-style:italic">No one picked this</span>';
  document.getElementById('tt-count').textContent=names.length
    ?names.length+' vote'+(names.length!==1?'s':''):'';
  tooltip.style.display='block';
  moveTip(e);ttOn=true;
}
function moveTip(e){
  const pad=16,tw=tooltip.offsetWidth||200,th=tooltip.offsetHeight||100;
  let x=e.clientX+pad,y=e.clientY+pad;
  if(x+tw>window.innerWidth-8)x=e.clientX-tw-pad;
  if(y+th>window.innerHeight-8)y=e.clientY-th-pad;
  tooltip.style.left=x+'px';tooltip.style.top=y+'px';
}
function hideTip(){tooltip.style.display='none';ttOn=false}
document.addEventListener('mousemove',e=>{if(ttOn)moveTip(e)});

async function loadData(){
  document.getElementById('last-updated').textContent='Refreshing\u2026';
  try{
    const r=await fetch(APPS_SCRIPT_URL+'?action=get',{cache:'no-store'});
    const j=await r.json();
    allData=j.data||[];results=j.results||{};render();
    document.getElementById('last-updated').textContent='Updated '+new Date().toLocaleTimeString();
  }catch{
    document.getElementById('main-content').innerHTML='<div class="empty-state"><p>Could not load predictions. Check Apps Script URL or <a href="predict.html">submit the first prediction</a>.</p></div>';
    document.getElementById('last-updated').textContent='Error';
  }
}

function getDateLabel(offsetDays){
  const d=new Date();
  d.setDate(d.getDate()+offsetDays);
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); // e.g. "Jun 9"
}

function setFilter(g,btn){
  currentFilter=g;
  // Reset all button states
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  // Reset dropdown
  const sel=document.getElementById('group-select');
  sel.value='';sel.classList.remove('active');
  if(btn) btn.classList.add('active');
  render();
}

function onGroupSelect(sel){
  if(!sel.value){setFilter('all',document.getElementById('btn-all'));return;}
  currentFilter=sel.value;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  sel.classList.add('active');
  render();
}

function render(){
  if(allData.length){
    const total=allData.reduce((s,p)=>s+Object.values(p.picks||{}).filter(v=>v).length,0);
    const sb=document.getElementById('stats-bar');sb.style.display='flex';
    sb.innerHTML='<div class="stat"><strong>'+allData.length+'</strong>Participants</div>'
      +'<div class="stat"><strong>'+total+'</strong>Total picks</div>'
      +'<div class="stat"><strong>'+Math.round(total/Math.max(allData.length,1))+'</strong>Avg picks/person</div>';
  }
  if(!allData.length){
    document.getElementById('main-content').innerHTML='<div class="empty-state"><p>No predictions yet. <a href="predict.html">Be the first!</a></p></div>';
    return;
  }

  let html='';

  if(currentFilter==='today'||currentFilter==='yesterday'||currentFilter==='tomorrow'){
    const offset=currentFilter==='yesterday'?-1:currentFilter==='tomorrow'?1:0;
    const targetLabel=getDateLabel(offset);
    const labelMap={yesterday:'Yesterday',today:'Today',tomorrow:'Tomorrow'};
    let anyMatch=false;
    Object.keys(GROUPS).forEach(letter=>{
      const teams=GROUPS[letter],matches=getMatches(teams),sched=SCHEDULE[letter];
      const dayMatches=[];
      matches.forEach(([home,away],mi)=>{
        const [,,date]=sched[mi]||[];
        if(date===targetLabel) dayMatches.push({home,away,mi});
      });
      if(!dayMatches.length) return;
      anyMatch=true;
      html+='<div class="group-section"><div class="group-heading">GROUP '+letter+' <span class="group-teams-list">'+teams.join(' \u00b7 ')+'</span></div>';
      dayMatches.forEach(({home,away,mi})=>{
        html+=buildMatchRow(letter,mi,home,away,sched[mi]);
      });
      html+='</div>';
    });
    if(!anyMatch){
      html='<div class="empty-state"><p>No group stage matches '+labelMap[currentFilter].toLowerCase()+'.<br><span style="font-size:12px;color:var(--muted)">The group stage runs June 11–27.</span></p></div>';
    }
  } else {
    const groups=currentFilter==='all'?Object.keys(GROUPS):[currentFilter];
    groups.forEach(letter=>{
      const teams=GROUPS[letter],matches=getMatches(teams),sched=SCHEDULE[letter];
      html+='<div class="group-section"><div class="group-heading">GROUP '+letter+' <span class="group-teams-list">'+teams.join(' \u00b7 ')+'</span></div>';
      matches.forEach(([home,away],mi)=>{
        html+=buildMatchRow(letter,mi,home,away,sched[mi]);
      });
      html+='</div>';
    });
  }

  document.getElementById('main-content').innerHTML=html;
}

function buildMatchRow(letter,mi,home,away,schedEntry){
  const [,,date,time,venue]=schedEntry||['','','','',''];
  const key=letter+'_'+mi;
  const result=results[key];
  const hv=[],dv=[],av=[];
  allData.forEach(p=>{
    const pick=(p.picks||{})[key]||'';
    if(pick===home)hv.push(p.name);
    else if(pick==='Draw')dv.push(p.name);
    else if(pick===away)av.push(p.name);
  });
  const tot=hv.length+dv.length+av.length;
  const pct=v=>tot>0?Math.round(v/tot*100):0;
  const hp=pct(hv.length),dp=pct(dv.length),ap=100-hp-dp;
  const MIN=8;
  let barHtml;
  if(tot===0){
    barHtml='<div class="no-votes"><span class="no-votes-text">No picks yet</span></div>';
  } else {
    let segs='';
    const homeWinner=result===home?' winner':'';
    const drawWinner=result==='Draw'?' winner':'';
    const awayWinner=result===away?' winner':'';
    if(hv.length>0){
      const lbl=hp>=MIN?home.split(' ')[0]+' '+hp+'%':'';
      segs+='<div class="bar-seg seg-home'+homeWinner+'" style="flex:'+hp+'" data-label="'+escA(home)+'" data-names="'+encodeURIComponent(JSON.stringify(hv))+'" data-color="var(--col-home)" onmouseenter="onSeg(event,this)" onmouseleave="hideTip()"><span class="seg-label">'+lbl+'</span></div>';
    }
    if(dv.length>0){
      const lbl=dp>=MIN?'Draw '+dp+'%':'';
      segs+='<div class="bar-seg seg-draw'+drawWinner+'" style="flex:'+dp+'" data-label="Draw" data-names="'+encodeURIComponent(JSON.stringify(dv))+'" data-color="var(--col-draw)" onmouseenter="onSeg(event,this)" onmouseleave="hideTip()"><span class="seg-label">'+lbl+'</span></div>';
    }
    if(av.length>0){
      const lbl=ap>=MIN?away.split(' ')[0]+' '+ap+'%':'';
      segs+='<div class="bar-seg seg-away'+awayWinner+'" style="flex:'+ap+'" data-label="'+escA(away)+'" data-names="'+encodeURIComponent(JSON.stringify(av))+'" data-color="var(--col-away)" onmouseenter="onSeg(event,this)" onmouseleave="hideTip()"><span class="seg-label">'+lbl+'</span></div>';
    }
    barHtml='<div class="bar-track">'+segs+'</div>';
  }
  return '<div class="match-row">'
    +'<div class="match-info">'
      +'<div class="match-teams">'+esc(home)+' <span class="match-vs">vs</span> '+esc(away)+'</div>'
      +(result?'<div class="result-badge-row"><span class="result-badge">FT – '+esc(result)+'</span></div>':'')
      +'<div class="match-meta"><span class="match-date">'+date+'</span>'+(time?' &middot; '+time:'')+(venue?' &middot; <span style="opacity:.6">'+esc(venue)+'</span>':'')+'</div>'
    +'</div>'
    +'<div class="vote-col"><div class="vote-bar-wrap">'+barHtml+'</div></div>'
    +'</div>';
}

function onSeg(e,el){
  showTip(e,el.dataset.label,JSON.parse(decodeURIComponent(el.dataset.names)),el.dataset.color);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escA(s){return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;')}

loadData();
</script>
</body>
</html>
